<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necrograd - Loading</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Slideshow -->
    <div class="bg-slideshow">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1545569341-9eb8b30979d9?w=1920&q=80')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1519608487953-e999c86e7455?w=1920&q=80')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1920&q=80')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=1920&q=80')"></div>
        <div class="bg-overlay"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles"></canvas>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Header -->
        <header class="header">
            <div class="server-status">
                <span class="status-dot"></span>
                <span class="status-text">ONLINE</span>
            </div>
            <div class="header-stats">
                <div class="header-stat">
                    <span class="header-stat-value" id="players-count">64</span>
                    <span class="header-stat-label">игроков</span>
                </div>
                <div class="header-divider"></div>
                <div class="header-stat">
                    <span class="header-stat-value">128</span>
                    <span class="header-stat-label">слотов</span>
                </div>
            </div>
        </header>

        <!-- Center Logo -->
        <main class="main-content">
            <div class="logo-section">
                <div class="logo-glow"></div>
                <div class="logo">
                    <span class="logo-text">NECRO</span>
                    <span class="logo-text accent">GRAD</span>
                </div>
                <div class="logo-tagline">DARK ROLEPLAY SERVER</div>
            </div>

            <!-- Social Links -->
            <div class="social-links">
                <a href="#" class="social-btn" data-tooltip="Discord">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                    </svg>
                </a>
                <a href="#" class="social-btn" data-tooltip="VKontakte">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.684 0H8.316C1.592 0 0 1.592 0 8.316v7.368C0 22.408 1.592 24 8.316 24h7.368C22.408 24 24 22.408 24 15.684V8.316C24 1.592 22.408 0 15.684 0zm3.692 17.123h-1.744c-.66 0-.864-.525-2.05-1.727-1.033-1-1.49-1.135-1.744-1.135-.356 0-.458.102-.458.593v1.575c0 .424-.135.678-1.253.678-1.846 0-3.896-1.118-5.335-3.202C4.624 10.857 4 8.57 4 8.096c0-.254.102-.491.593-.491h1.744c.44 0 .61.203.78.678.863 2.49 2.303 4.675 2.896 4.675.22 0 .322-.102.322-.66V9.721c-.068-1.186-.695-1.287-.695-1.71 0-.204.17-.407.44-.407h2.744c.373 0 .508.203.508.643v3.473c0 .372.17.508.271.508.22 0 .407-.136.814-.542 1.27-1.422 2.18-3.61 2.18-3.61.119-.254.322-.491.763-.491h1.744c.525 0 .644.27.525.643-.22 1.017-2.354 4.031-2.354 4.031-.186.305-.254.44 0 .78.186.254.796.779 1.203 1.253.745.847 1.32 1.558 1.473 2.05.17.49-.085.744-.576.744z"/>
                    </svg>
                </a>
                <a href="#" class="social-btn" data-tooltip="Telegram">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                    </svg>
                </a>
                <a href="#" class="social-btn" data-tooltip="YouTube">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </a>
            </div>
        </main>

        <!-- Music Player -->
        <div class="music-player">
            <button class="music-toggle" id="music-toggle">
                <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            <div class="music-info">
                <div class="music-title" id="music-title">Ambient Atmosphere</div>
                <div class="music-artist" id="music-artist">Necrograd OST</div>
            </div>
            <div class="music-progress">
                <div class="music-progress-bar" id="music-progress"></div>
            </div>
            <div class="music-controls">
                <button class="music-btn" id="prev-track">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="music-btn" id="next-track">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
                <div class="volume-wrapper">
                    <button class="music-btn" id="volume-btn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </button>
                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50">
                </div>
            </div>
        </div>

        <!-- Footer / Loading -->
        <footer class="footer">
            <div class="loading-section">
                <div class="loading-header">
                    <div class="loading-status">
                        <span class="loading-label">ЗАГРУЗКА</span>
                        <span class="loading-percentage" id="loading-percent">0%</span>
                    </div>
                    <div class="loading-file" id="loading-file">Подключение к серверу...</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-glow"></div>
                    </div>
                </div>
                <div class="loading-details">
                    <div class="detail">
                        <span class="detail-label">ФАЙЛОВ</span>
                        <span class="detail-value" id="files-count">0 / 347</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">СКОРОСТЬ</span>
                        <span class="detail-value" id="download-speed">-- MB/s</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">РАЗМЕР</span>
                        <span class="detail-value" id="total-size">156 MB</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">ПИНГ</span>
                        <span class="detail-value" id="ping-value">-- ms</span>
                    </div>
                </div>
            </div>

            <div class="tip-section">
                <span class="tip-icon">i</span>
                <span class="tip-text" id="tip-text">Нажмите F1, чтобы открыть меню помощи на сервере</span>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
