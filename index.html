<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necrograd - Loading</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- GIF Background -->
    <div class="gif-background">
        <img src="background.gif" alt="Background" id="gif-bg">
        <div class="gif-overlay"></div>
    </div>

    <!-- Grid Background -->
    <div class="grid-background"></div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Particles -->
    <canvas id="particles"></canvas>

    <!-- Audio -->
    <audio id="bg-music" autoplay loop style="display:none;">
        <source src="tihij_ogonek.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Content -->
    <div class="container">

        <main class="main-content">
            <div class="logo-section">
                <div class="logo-glow"></div>
                <div class="logo-wrapper" id="logo-wrapper">
                    <div class="logo">
                        <span class="logo-text" data-text="NECRO">NECRO</span>
                        <span class="logo-text accent" data-text="GRAD">GRAD</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="loading-section">
                <div class="loading-top">
                    <span class="loading-label">ЗАГРУЗКА</span>
                    <span class="loading-percentage" id="loading-percent">0%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-glow"></div>
                        <div class="progress-stripes"></div>
                    </div>
                </div>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
