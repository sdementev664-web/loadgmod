<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necrograd - Loading</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- GIF Background -->
    <div class="gif-background">
        <img src="background.gif" alt="Background" id="gif-bg">
        <div class="gif-overlay"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles"></canvas>

    <!-- Audio Player (скрытый, автоматический повтор) -->
    <audio id="bg-music" autoplay loop style="display:none;">
        <source src="tihij_ogonek.mp3" type="audio/mpeg">
    </audio>

    <!-- Main Content -->
    <div class="container">

        <!-- Center Logo -->
        <main class="main-content">
            <div class="logo-section">
                <div class="logo-glow"></div>
                <div class="logo">
                    <span class="logo-text">NECRO</span>
                    <span class="logo-text accent">GRAD</span>
                </div>
                <div class="logo-tagline">DARK ROLEPLAY SERVER</div>
            </div>
        </main>

        <!-- Footer / Loading -->
        <footer class="footer">
            <div class="loading-section">
                <div class="loading-header">
                    <div class="loading-status">
                        <span class="loading-label">ЗАГРУЗКА</span>
                        <span class="loading-percentage" id="loading-percent">0%</span>
                    </div>
                    <div class="loading-file" id="loading-file">Подключение к серверу...</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-glow"></div>
                    </div>
                </div>
                <div class="loading-details">
                    <div class="detail">
                        <span class="detail-label">ФАЙЛОВ</span>
                        <span class="detail-value" id="files-count">0 / 0</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">СКОРОСТЬ</span>
                        <span class="detail-value" id="download-speed">0 KB/s</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">СКАЧАНО</span>
                        <span class="detail-value" id="downloaded-size">0 MB</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">ПИНГ</span>
                        <span class="detail-value" id="ping-value">-- ms</span>
                    </div>
                </div>
            </div>

            <div class="tip-section">
                <span class="tip-icon">i</span>
                <span class="tip-text" id="tip-text">Нажмите F1, чтобы открыть меню помощи на сервере</span>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
