<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Necrograd - Loading</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Video Background -->
    <div class="video-background">
        <iframe 
            id="bg-video"
            src="https://www.youtube.com/embed/rfa06YY-W7I?autoplay=1&mute=0&loop=1&playlist=rfa06YY-W7I&controls=0&showinfo=0&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&vq=hd1080"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
        <div class="video-overlay"></div>
    </div>

    <!-- Particles -->
    <canvas id="particles"></canvas>

    <!-- Volume Control Button -->
    <div class="volume-control-btn">
        <button class="volume-btn" id="volume-toggle">
            <svg class="volume-on" viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg class="volume-off" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
        </button>
        <input type="range" class="volume-slider" id="volume-range" min="0" max="100" value="70">
        <span class="volume-value" id="volume-value">70%</span>
    </div>

    <!-- Main Content -->
    <div class="container">
        
        <!-- Header -->
        <header class="header">
            <div class="server-status">
                <span class="status-dot"></span>
                <span class="status-text">ONLINE</span>
            </div>
            <div class="header-stats">
                <div class="header-stat">
                    <span class="header-stat-value" id="players-count">64</span>
                    <span class="header-stat-label">игроков</span>
                </div>
                <div class="header-divider"></div>
                <div class="header-stat">
                    <span class="header-stat-value">128</span>
                    <span class="header-stat-label">слотов</span>
                </div>
            </div>
        </header>

        <!-- Center Logo -->
        <main class="main-content">
            <div class="logo-section">
                <div class="logo-glow"></div>
                <div class="logo">
                    <span class="logo-text">NECRO</span>
                    <span class="logo-text accent">GRAD</span>
                </div>
                <div class="logo-tagline">DARK ROLEPLAY SERVER</div>
            </div>
        </main>

        <!-- Footer / Loading -->
        <footer class="footer">
            <div class="loading-section">
                <div class="loading-header">
                    <div class="loading-status">
                        <span class="loading-label">ЗАГРУЗКА</span>
                        <span class="loading-percentage" id="loading-percent">0%</span>
                    </div>
                    <div class="loading-file" id="loading-file">Подключение к серверу...</div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-glow"></div>
                    </div>
                </div>
                <div class="loading-details">
                    <div class="detail">
                        <span class="detail-label">ФАЙЛОВ</span>
                        <span class="detail-value" id="files-count">0 / 347</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">СКОРОСТЬ</span>
                        <span class="detail-value" id="download-speed">-- MB/s</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">РАЗМЕР</span>
                        <span class="detail-value" id="total-size">156 MB</span>
                    </div>
                    <div class="detail">
                        <span class="detail-label">ПИНГ</span>
                        <span class="detail-value" id="ping-value">-- ms</span>
                    </div>
                </div>
            </div>

            <div class="tip-section">
                <span class="tip-icon">i</span>
                <span class="tip-text" id="tip-text">Нажмите F1, чтобы открыть меню помощи на сервере</span>
            </div>
        </footer>

    </div>

    <!-- Click to Unmute Overlay -->
    <div class="unmute-overlay" id="unmute-overlay">
        <div class="unmute-content">
            <div class="unmute-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </div>
            <h2>Нажмите для включения звука</h2>
            <p>Кликните в любом месте экрана</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
